<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DnD Scribe — Prod Operator</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/costs.css" />
  <link rel="stylesheet" href="/jobs.css" />
  <link rel="stylesheet" href="/access.css" />
  <link rel="stylesheet" href="/notes.css" />
</head>
<body>
  <div class="app">
    <aside class="rail">
      <div class="brand">
        <div class="brand-mark">d20</div>
        <div>
          <strong>DnD Scribe</strong>
          <span>Prod operator</span>
        </div>
      </div>

      <section class="operator">
        <div id="authPanel">
          <span class="label">Acesso</span>
          <strong>Acesso fechado</strong>
          <small>Login da mesa carregando.</small>
        </div>
      </section>

      <div class="rail-title">
        <span>Sessoes</span>
        <button id="refreshSessionsBtn" title="Recarregar sessoes">↻</button>
      </div>
      <div id="sessionList" class="session-list"></div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <span id="eyebrow" class="label">Conectando</span>
          <h1 id="title">DnD Scribe</h1>
        </div>
        <div class="top-actions">
          <a class="button-link" href="/roll20.html">Roll20</a>
          <button id="downloadTemplateBtn">Template DM</button>
          <button id="downloadDecisionsBtn">Baixar decisoes</button>
          <button id="applyDecisionsBtn" class="primary">Aplicar decisoes</button>
        </div>
      </header>

      <section id="statusStrip" class="status-strip"></section>

      <nav class="tabs" id="tabs">
        <button data-tab="sessions">Sessoes</button>
        <button data-tab="review" class="active">Review</button>
        <button data-tab="candidates">Candidatos</button>
        <button data-tab="roll20">Roll20</button>
        <button data-tab="publications">Publicacoes</button>
        <button data-tab="ops">Operacao</button>
      </nav>

      <section id="view" class="view"></section>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>
  <section id="musicDock" class="music-dock collapsed"></section>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth-fetch.js"></script>
  <script src="/app.js"></script>
  <script src="/jobs.js"></script>
  <script src="/costs.js"></script>
  <script src="/ui-bridge.js"></script>
  <script src="/access.js"></script>
  <script src="/notes.js"></script>
</body>
</html>
