name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-checks:
    name: App checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check API syntax
        run: npm run check:api

      - name: Check worker syntax
        run: npm run check:workers

      - name: Check frontend syntax
        run: npm run check:web

      - name: Check monitoring syntax
        run: node --check lib/monitoring.js && node --check web/monitoring.js

      - name: Build static frontend
        run: npm run build

      - name: Verify public output
        run: |
          test -s public/index.html
          test -s public/app.js
          test -s public/jobs.js
          test -s public/costs.js
          test -s public/monitoring.js
          test -s public/monitoring.css

  python-syntax:
    name: Python syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile Python tools
        run: python -m compileall -q tools
