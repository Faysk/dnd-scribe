name: Transcription Worker

on:
  workflow_dispatch:
    inputs:
      source_session_id:
        description: "Craig source_session_id, for example craig-BIRq3nIWB4v9"
        required: true
        type: string
      campaign:
        description: "Campaign slug"
        required: true
        default: "yuhara-main"
        type: string
      limit:
        description: "Maximum speech slices to process"
        required: true
        default: "1"
        type: string
      execute:
        description: "Actually call OpenAI and write transcript rows"
        required: true
        default: false
        type: boolean
      transcription_cost_usd_per_minute:
        description: "Required for execute=true unless DND_COST_TRANSCRIPTION_AUDIO_MINUTE_USD secret exists"
        required: false
        default: ""
        type: string
      max_estimated_cost_usd:
        description: "Abort if selected batch estimate is above this"
        required: true
        default: "0.05"
        type: string
      approve_cost_usd:
        description: "Explicit approval cap for this run"
        required: true
        default: "0.05"
        type: string
      model:
        description: "Optional transcription model override"
        required: false
        default: ""
        type: string

concurrency:
  group: transcription-${{ github.event.inputs.source_session_id }}
  cancel-in-progress: false

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      DND_COST_TRANSCRIPTION_AUDIO_MINUTE_USD: ${{ github.event.inputs.transcription_cost_usd_per_minute || secrets.DND_COST_TRANSCRIPTION_AUDIO_MINUTE_USD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: tools/requirements-speech-worker.txt

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${DATABASE_URL}" || (echo "DATABASE_URL secret is missing" && exit 1)
          test -n "${R2_BUCKET}" || (echo "R2_BUCKET secret is missing" && exit 1)
          test -n "${R2_ACCESS_KEY_ID}" || (echo "R2_ACCESS_KEY_ID secret is missing" && exit 1)
          test -n "${R2_SECRET_ACCESS_KEY}" || (echo "R2_SECRET_ACCESS_KEY secret is missing" && exit 1)
          if [ -z "${R2_S3_ENDPOINT}" ] && [ -z "${R2_ENDPOINT}" ]; then
            echo "R2_S3_ENDPOINT or R2_ENDPOINT secret is missing"
            exit 1
          fi
          if [ "${{ github.event.inputs.execute }}" = "true" ]; then
            test -n "${OPENAI_API_KEY}" || (echo "OPENAI_API_KEY secret is missing" && exit 1)
            test -n "${DND_COST_TRANSCRIPTION_AUDIO_MINUTE_USD}" || (echo "transcription_cost_usd_per_minute or DND_COST_TRANSCRIPTION_AUDIO_MINUTE_USD secret is required for execute=true" && exit 1)
          fi

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          python -m pip install --upgrade pip
          python -m pip install -r tools/requirements-speech-worker.txt

      - name: Run transcription worker
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "${{ github.event.inputs.source_session_id }}"
            --campaign "${{ github.event.inputs.campaign }}"
            --limit "${{ github.event.inputs.limit }}"
            --max-estimated-cost-usd "${{ github.event.inputs.max_estimated_cost_usd }}"
            --approve-cost-usd "${{ github.event.inputs.approve_cost_usd }}"
            --json
          )
          if [ "${{ github.event.inputs.execute }}" = "true" ]; then
            args+=(--execute)
          fi
          if [ -n "${{ github.event.inputs.model }}" ]; then
            args+=(--model "${{ github.event.inputs.model }}")
          fi
          python tools/run_transcription_job.py "${args[@]}" 2>&1 | tee transcription-worker.log

      - name: Continue pipeline supervisor
        if: success() && github.event.inputs.execute == 'true'
        continue-on-error: true
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET || secrets.DND_CRON_SECRET }}
        shell: bash
        run: |
          python tools/trigger_pipeline_supervisor.py \
            --source-session-id "${{ github.event.inputs.source_session_id }}" \
            --campaign "${{ github.event.inputs.campaign }}" \
            --site-url "https://dnd.faysk.dev" \
            --max-runs 1

      - name: Upload worker log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: transcription-worker-log
          path: transcription-worker.log
          if-no-files-found: ignore

      - name: Notify Discord
        if: always()
        env:
          DND_DISCORD_WEBHOOK_URL: ${{ secrets.DND_DISCORD_WEBHOOK_URL }}
        shell: bash
        run: |
          python tools/notify_discord_webhook.py \
            --title "Transcription Worker" \
            --status "${{ job.status }}" \
            --session "${{ github.event.inputs.source_session_id }}" \
            --campaign "${{ github.event.inputs.campaign }}" \
            --workflow "${{ github.workflow }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --field "execute=${{ github.event.inputs.execute }}" \
            --field "limit=${{ github.event.inputs.limit }}" \
            --field "approved_usd=${{ github.event.inputs.approve_cost_usd }}"
