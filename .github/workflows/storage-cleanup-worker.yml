name: Storage Cleanup Worker

on:
  workflow_dispatch:
    inputs:
      campaign:
        description: "Campaign slug"
        required: true
        default: "yuhara-main"
        type: string
      source_session_id:
        description: "Optional Craig source_session_id"
        required: false
        default: ""
        type: string
      limit:
        description: "Maximum delete_ready objects to inspect/delete"
        required: true
        default: "20"
        type: string
      execute:
        description: "Actually delete objects from R2 and mark DB rows deleted"
        required: true
        default: false
        type: boolean
      confirm:
        description: "Required for execute=true: DELETE_READY_R2"
        required: false
        default: ""
        type: string

concurrency:
  group: storage-cleanup-${{ github.event.inputs.campaign }}-${{ github.event.inputs.source_session_id || 'all' }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: tools/requirements-speech-worker.txt

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${DATABASE_URL}" || (echo "DATABASE_URL secret is missing" && exit 1)
          test -n "${R2_BUCKET}" || (echo "R2_BUCKET secret is missing" && exit 1)
          test -n "${R2_ACCESS_KEY_ID}" || (echo "R2_ACCESS_KEY_ID secret is missing" && exit 1)
          test -n "${R2_SECRET_ACCESS_KEY}" || (echo "R2_SECRET_ACCESS_KEY secret is missing" && exit 1)
          if [ -z "${R2_S3_ENDPOINT}" ] && [ -z "${R2_ENDPOINT}" ]; then
            echo "R2_S3_ENDPOINT or R2_ENDPOINT secret is missing"
            exit 1
          fi
          if [ "${{ github.event.inputs.execute }}" = "true" ]; then
            test "${{ github.event.inputs.confirm }}" = "DELETE_READY_R2" || (echo "execute=true requires confirm=DELETE_READY_R2" && exit 1)
          fi

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r tools/requirements-speech-worker.txt

      - name: Run storage cleanup worker
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --campaign "${{ github.event.inputs.campaign }}"
            --limit "${{ github.event.inputs.limit }}"
            --actor "github-actions:${{ github.run_id }}"
            --json
          )
          if [ -n "${{ github.event.inputs.source_session_id }}" ]; then
            args+=(--source-session-id "${{ github.event.inputs.source_session_id }}")
          fi
          if [ "${{ github.event.inputs.execute }}" = "true" ]; then
            args+=(--execute --confirm "${{ github.event.inputs.confirm }}")
          fi
          python tools/storage_cleanup_worker.py "${args[@]}" 2>&1 | tee storage-cleanup-worker.log

      - name: Upload worker log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: storage-cleanup-worker-log
          path: storage-cleanup-worker.log
          if-no-files-found: ignore

      - name: Notify Discord
        if: always()
        env:
          DND_DISCORD_WEBHOOK_URL: ${{ secrets.DND_DISCORD_WEBHOOK_URL }}
        shell: bash
        run: |
          python tools/notify_discord_webhook.py \
            --title "Storage Cleanup Worker" \
            --status "${{ job.status }}" \
            --session "${{ github.event.inputs.source_session_id }}" \
            --campaign "${{ github.event.inputs.campaign }}" \
            --workflow "${{ github.workflow }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --field "execute=${{ github.event.inputs.execute }}" \
            --field "limit=${{ github.event.inputs.limit }}"
