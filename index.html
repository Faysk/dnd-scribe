<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DnD Scribe — Demo Visual</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">d20</div>
        <div>
          <strong>DnD Scribe</strong>
          <span>Memória auditável da mesa</span>
        </div>
      </div>

      <div class="perspective-card">
        <label for="viewerSelect">Perspectiva atual</label>
        <select id="viewerSelect"></select>
        <p id="viewerHint">Carregando permissões...</p>
      </div>

      <nav class="nav" id="nav">
        <button data-view="dashboard" class="active">Agora</button>
        <button data-view="capture">Captura</button>
        <button data-view="review">Revisão</button>
        <button data-view="transcript">Transcrição</button>
        <button data-view="canon">Canon</button>
        <button data-view="secrets">Segredos</button>
        <button data-view="knowledge">Quem sabe o quê</button>
        <button data-view="entities">Entidades</button>
        <button data-view="outtakes">Bastidores</button>
        <button data-view="settings">Permissões</button>
      </nav>

      <div class="sidebar-footer">
        <div class="mini-stat">
          <strong>Demo v2</strong>
          <span>HTML + CSS + JS puro</span>
        </div>
        <a href="pitch.html">Abrir pitch visual</a>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <span class="eyebrow">Projeto inicial</span>
          <h1 id="viewTitle">Agora</h1>
        </div>
        <div class="top-actions">
          <button class="ghost" id="openQuickMarker">+ Momento</button>
          <button class="primary" id="openNewSecret">+ Segredo</button>
        </div>
      </header>

      <section id="view" class="view"></section>
    </main>
  </div>

  <div class="modal-backdrop hidden" id="modalBackdrop">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
